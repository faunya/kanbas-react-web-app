        <div class="col-8" style="flex-basis: 80%;">
            
            <button class="btn btn-secondary float-end" style="margin-left: 5px;">
                <i class="fa fa-ellipsis-v" aria-hidden="true"></i>
            </button>

            <span class="float-end" style="color: green;margin-top: 7px;margin-right: 10px;">
                <i class="fa-solid fa-circle-check align-middle" style="color: green"></i>
                Published
            </span>

            <hr style="margin-top: 50px;" />

            <label for="assignmentName" class="form-label">Assignment Name</label>
            <input class="form-control" id="assignmentName" type="text" value="A1 + ENV + HTML" />

            <textarea class="form-control" cols="25" rows="5" style="margin-top: 25px;">This is the assignment description
            </textarea><br /><br />


            <div class="row g-2">
                <label class="form-label col-3" style="text-align: end;">Points</label>
                <input class="form-control col-9" id="aPoints" value="100" type="number" style="width: 50%;" />
            </div>

            <div class="row top-mar-20">
                <label class="form-label col-3" style="text-align: end;">Assignment Group</label>

                <select class="form-control col-9" style="width: 50%;">
                    <option selected>ASSIGNMENTS</option>
                </select>
            </div>

            <div class="row top-mar-20">
                <label class="form-label col-3" style="text-align: end;">Display Grade as</label>

                <select class="form-control col-9" style="width: 50%;">
                    <option selected>Percentage</option>
                </select>
            </div>

            <div class="row top-mar-20">
                <div style="padding-left: 25%;">
                    <input class="form-check-input" type="checkbox" value="" id="flexCheckDefault">
                    <label class="form-check-label" for="flexCheckDefault">
                        Do not count the assignment towards the final grade
                    </label>
                </div>
            </div>

            <div class="row top-mar-20">
                <label class="form-label col-3" style="text-align: end;">Submission Type</label>

                <div class="col-9" style="border-color: lightgrey;border-style: solid;width: 50%;padding: 20px;">
                    <select class="form-control col-9" style="width: 50%">
                        <option selected>Online</option>
                    </select>

                    <label class="top-mar-20" style="font-weight:bold;">Online Entry Options</label><br />

                    <div class="top-mar-20">
                        <input class="form-check-input" type="checkbox" value="" id="text">
                        <label class="form-check-label" for="text">
                            Text Entry
                        </label>
                    </div>
                    <div class="top-mar-20">
                        <input class="form-check-input" type="checkbox" value="" id="url">
                        <label class="form-check-label" for="url">
                            Website URL
                        </label>
                    </div>
                    <div class="top-mar-20">
                        <input class="form-check-input" type="checkbox" value="" id="rec">
                        <label class="form-check-label" for="rec">
                            Media Recordings
                        </label>
                    </div>
                    <div class="top-mar-20">
                        <input class="form-check-input" type="checkbox" value="" id="anno">
                        <label class="form-check-label" for="anno">
                            Student Annotations
                        </label>
                    </div>
                    <div class="top-mar-20">
                        <input class="form-check-input" type="checkbox" value="" id="file">
                        <label class="form-check-label" for="file">
                            File Uploads
                        </label>
                    </div>

                </div>
            </div>

            <div class="row top-mar-20">
                <label class="form-label col-3" style="text-align: end;">Assign</label>

                <div class="col-9" style="border-color: lightgrey;border-style: solid;width: 50%;padding: 20px;">
                    <div>
                        <label class="form-check-label" for="assignTo">
                            Assign To
                        </label>
                        <input class="form-control col-9" id="assignTo" value="Everyone" />

                    </div>


                    <div class="top-mar-20">
                        <label>Due</label> <br />
                        <input class="form-control" type="date" value="2021-01-01" /><br /><br />
                    </div>

                    <div class="row">
                        <div class="col-6">
                            <label>Available from</label> <br />
                            <input class="form-control col-6" type="date" value="2021-01-01"
                                style="display: inline;" /><br /><br />

                        </div>
                        <div class="col-6">
                            <label>Until</label> <br />
                            <input class="form-control col-6" type="date" value="2021-01-01"
                                style="display: inline;" /><br /><br />

                        </div>
                    </div>

                    <div class="row">
                        <button class="btn btn-secondary float-end" style="margin-left: 5px;">
                            <i class="fa-solid fa-plus"></i>
                            Add
                        </button>
                    </div>

                </div>
            </div>

            <div class="row top-mar-20">
                <hr />
                <div >
                    <button class="float-end btn btn-danger"><a href="index.html" style="text-decoration:none;color:white;">Save</a></button>
                    <button class="float-end btn btn-secondary"><a href="index.html" style="text-decoration:none;color:black;">Cancel</a></button>
                </div>
            </div>
        </div>

    </div>
</body>
